<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Gambar</title>

    <link rel="stylesheet" href="./admin/css/upload.css">
</head>

<body>

<div class="container">

    <h2>Upload Gambar Cloudinary</h2>

    <input
        type="file"
        id="file">

    <br><br>

    <button id="uploadBtn">
        Upload
    </button>

    <br><br>

    <img
        id="preview"
        width="250">

    <br><br>

    <textarea
        id="hasil"
        rows="4"
        readonly
        placeholder="URL hasil upload akan muncul di sini"></textarea>

</div>

<script src="./admin/js/upload.js"></script>

</body>
</html>
